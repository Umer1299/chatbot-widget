<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Chatflow Embed</title>

<!-- Markdown parser -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

*{
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
margin:0;
padding:0
}

body{
height:100vh;
display:flex;
flex-direction:column;
background:#f3f4f6;
}

.chat-container{
flex:1;
display:flex;
flex-direction:column;
height:100%;
width:100%;
}

.header{
padding:16px;
font-weight:600;
color:white;
}

.messages{
flex:1;
overflow-y:auto;
padding:16px;
background:#f3f4f6;
}

.message{
margin-bottom:12px;
display:flex;
flex-direction:column;
max-width:100%;
}

.user{align-items:flex-end}
.bot{align-items:flex-start}

.bubble-msg{
max-width:75%;
padding:12px 14px;
border-radius:16px;
font-size:14px;
line-height:1.5;
word-break:break-word;
}

/* Markdown Styling */

.bubble-msg p{margin:4px 0}

.bubble-msg ul{
padding-left:18px;
margin:6px 0
}

.bubble-msg li{
margin:3px 0
}

.bubble-msg a{
color:#2563eb;
text-decoration:underline
}

.bubble-msg pre{
background:#111;
color:#fff;
padding:10px;
border-radius:8px;
overflow:auto;
margin-top:6px
}

.bubble-msg code{
background:#f3f4f6;
padding:2px 4px;
border-radius:4px
}

.starter-prompts{
padding:10px 16px;
display:flex;
flex-wrap:wrap;
gap:8px;
background:#f3f4f6
}

.prompt{
background:white;
border:1px solid #e5e7eb;
padding:8px 12px;
border-radius:20px;
font-size:13px;
cursor:pointer
}

.prompt:hover{
background:#f9fafb
}

.input-area{
padding:12px;
display:flex;
background:white;
border-top:1px solid #eee
}

input{
flex:1;
padding:12px 14px;
border-radius:999px;
border:1px solid #ddd;
outline:none;
font-size:14px
}

.send-btn{
margin-left:8px;
width:40px;
height:40px;
border-radius:50%;
border:none;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
color:white;
font-size:16px
}

.typing{
display:inline-flex;
gap:4px
}

.typing span{
width:6px;
height:6px;
background:#999;
border-radius:50%;
animation:bounce 1.4s infinite ease-in-out both
}

.typing span:nth-child(1){animation-delay:-0.32s}
.typing span:nth-child(2){animation-delay:-0.16s}

@keyframes bounce{
0%,80%,100%{transform:scale(0)}
40%{transform:scale(1)}
}

</style>
</head>

<body>

<div class="chat-container">

<div class="header" id="header"></div>

<div class="messages" id="messages"></div>

<div id="starterPrompts" class="starter-prompts"></div>

<div class="input-area">
<input id="input" placeholder="Message..." />
<button class="send-btn" id="sendBtn">➤</button>
</div>

</div>

<script>

(function(){

var params = new URLSearchParams(window.location.search)
var botId = params.get("botId")

if(!botId){
document.body.innerHTML="Bot ID missing"
return
}

var BASE_URL="https://chatflowai.io/version-test/api/1.1/wf/"
var CONFIG_URL=BASE_URL+"get-chatbot?chatID="+botId
var MESSAGE_URL=BASE_URL+"create-chat"

var header=document.getElementById("header")
var messages=document.getElementById("messages")
var input=document.getElementById("input")
var sendBtn=document.getElementById("sendBtn")
var promptsContainer=document.getElementById("starterPrompts")

var sessionId="s_"+Date.now()
var primaryColor="#2563eb"

fetch(CONFIG_URL)
.then(r=>r.json())
.then(function(json){

var config=json.response||{}

primaryColor=config.primaryColor||primaryColor

header.textContent=config.name||"Chat Assistant"
header.style.background=primaryColor
sendBtn.style.background=primaryColor

if(config.welcomeMessage){
appendMessage(config.welcomeMessage,"bot")
}

if(config.starterPrompts){
renderPrompts(config.starterPrompts)
}

})

function renderPrompts(list){

if(typeof list==="string"){
try{list=JSON.parse(list)}catch(e){}
}

if(!Array.isArray(list))return

list.forEach(function(text){

var btn=document.createElement("div")
btn.className="prompt"
btn.textContent=text

btn.onclick=function(){
input.value=text
sendMessage()
}

promptsContainer.appendChild(btn)

})

}

function appendMessage(text,role){

var msg=document.createElement("div")
msg.className="message "+role

var bubble=document.createElement("div")
bubble.className="bubble-msg"

if(role==="user"){

bubble.style.background=primaryColor
bubble.style.color="white"
bubble.style.borderBottomRightRadius="6px"
bubble.textContent=text

}else{

bubble.style.background="white"
bubble.style.color="#111"
bubble.style.borderBottomLeftRadius="6px"

bubble.innerHTML=marked.parse(text)

}

msg.appendChild(bubble)
messages.appendChild(msg)

messages.scrollTop=messages.scrollHeight

return bubble

}

function typeWriter(element,text){

var i=0
var temp=""

function type(){

if(i<text.length){

temp+=text.charAt(i)
element.textContent=temp

i++

messages.scrollTop=messages.scrollHeight

setTimeout(type,15)

}else{

/* render markdown */
element.innerHTML=marked.parse(text)

}

}

type()

}

function sendMessage(){

var text=input.value.trim()
if(!text)return

appendMessage(text,"user")
input.value=""

var botBubble=appendMessage("","bot")

botBubble.innerHTML='<div class="typing"><span></span><span></span><span></span></div>'

fetch(MESSAGE_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
botId:botId,
message:text,
sessionId:sessionId
})
})
.then(r=>r.json())
.then(function(data){

var reply=data.text||(data.response && data.response.text)||"No response."

typeWriter(botBubble,reply)

})
.catch(function(){

botBubble.textContent="Server error."

})

}

sendBtn.onclick=sendMessage

input.addEventListener("keydown",function(e){

if(e.key==="Enter" && !e.shiftKey){
e.preventDefault()
sendMessage()
}

})

})()

</script>

</body>
</html>
